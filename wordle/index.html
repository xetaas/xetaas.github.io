<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evil Wordle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <div>
          <h1>Evil Wordle</h1>
          <p>Same rules, but the answer keeps changing. Good luck.</p>
        </div>
        <div class="meta">
          <div id="remaining">Candidates: --</div>
          <div id="guessCount">Guesses: 0 / 6</div>
        </div>
      </header>

      <main class="game">
        <section>
          <div id="board" class="board" aria-label="Wordle board" role="grid"></div>
          <div id="status" class="status" aria-live="polite"></div>
        </section>

        <section class="controls">
          <form id="guessForm" autocomplete="off">
            <input
              id="guessInput"
              name="guess"
              type="text"
              inputmode="text"
              maxlength="5"
              placeholder="Enter guess"
              aria-label="Enter guess"
            />
            <button type="submit">Submit</button>
          </form>
          <div id="keyboard" class="keyboard" aria-label="On-screen keyboard"></div>
          <button id="resetBtn" class="reset" type="button">Reset</button>
        </section>
      </main>

      <footer class="footer">
      </footer>
    </div>

    <noscript>This game requires JavaScript.</noscript>
    <script src="app.js"></script>
  </body>
</html>
